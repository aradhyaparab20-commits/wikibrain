<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiBrain — Synapse Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #040508;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --muted: #3a3d42;
            --subtle: #5a6070;
            --body: #a8b0c0;
            --bright: #e8ecf4;
            --mono: 'DM Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--body);
            font-family: var(--mono);
            overflow: hidden;
        }

        /* ── ATMOSPHERE ─────────────────────────────────── */
        #atmosphere {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 60% 50% at 25% 30%, rgba(56, 189, 248, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 75% 70%, rgba(168, 85, 247, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 80% 40% at 50% 50%, rgba(16, 185, 129, 0.03) 0%, transparent 60%);
        }

        /* Subtle scanlines */
        #atmosphere::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px,
                    rgba(255, 255, 255, 0.008) 2px, rgba(255, 255, 255, 0.008) 4px);
        }

        /* ── PARTICLE CANVAS ─────────────────────────────── */
        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ── TOPBAR ──────────────────────────────────────── */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 0 24px;
            background: rgba(4, 5, 8, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
        }

        .logo {
            font-family: var(--display);
            font-size: 15px;
            font-weight: 800;
            color: var(--bright);
            letter-spacing: 0.03em;
        }

        .logo em {
            color: #38bdf8;
            font-style: normal;
        }

        .logo-sep {
            color: var(--muted);
            margin: 0 6px;
        }

        .logo-sub {
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: var(--subtle);
            text-transform: uppercase;
        }

        .nav-link {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--subtle);
            text-decoration: none;
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.4);
            background: rgba(56, 189, 248, 0.05);
        }

        #stats-bar {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .stat-val {
            font-family: var(--display);
            font-size: 16px;
            font-weight: 800;
            color: var(--bright);
            line-height: 1;
        }

        .stat-lbl {
            color: var(--subtle);
            margin-top: 2px;
        }

        /* ── GRAPH ───────────────────────────────────────── */
        #graph {
            position: fixed;
            inset: 52px 0 0 0;
            z-index: 10;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* SVG elements */
        .link-base {
            stroke-width: 1;
            stroke-opacity: 0.25;
        }

        .link-glow {
            stroke-width: 3;
            stroke-opacity: 0;
            filter: url(#glow-link);
            transition: stroke-opacity 0.3s;
        }

        .link-flow {
            stroke-width: 1.5;
            stroke-dasharray: 4 12;
            stroke-opacity: 0;
        }

        .node-outer {
            fill-opacity: 0;
            stroke-width: 1.5;
        }

        .node-inner {}

        .node-core {}

        .node-label {
            font-family: var(--mono);
            font-size: 9px;
            font-weight: 500;
            fill: var(--subtle);
            letter-spacing: 0.05em;
            pointer-events: none;
            text-transform: uppercase;
            transition: fill 0.2s;
        }

        /* ── TOOLTIP ─────────────────────────────────────── */
        #tooltip {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 300;
            min-width: 200px;
        }

        .tt-inner {
            background: rgba(8, 10, 16, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .tt-folder {
            font-size: 8px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .tt-name {
            font-family: var(--display);
            font-size: 15px;
            font-weight: 700;
            color: var(--bright);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .tt-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 8px;
        }

        .tt-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-bottom: 4px;
        }

        .tt-key {
            color: var(--subtle);
        }

        .tt-val {
            color: var(--body);
            font-weight: 500;
        }

        .tt-hint {
            font-size: 9px;
            color: var(--muted);
            margin-top: 10px;
            letter-spacing: 0.05em;
        }

        /* ── LEGEND ──────────────────────────────────────── */
        #legend {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 200;
            background: rgba(8, 10, 16, 0.9);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            backdrop-filter: blur(20px);
            min-width: 160px;
        }

        #legend h4 {
            font-size: 8px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-bottom: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 7px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-glyph {
            position: relative;
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .legend-glyph-circle {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
        }

        .legend-glyph-ring {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid currentColor;
            opacity: 0.3;
            position: absolute;
            top: 0;
            left: 0;
        }

        .legend-name {
            font-size: 10px;
            color: var(--body);
            letter-spacing: 0.04em;
        }

        .legend-count {
            font-size: 9px;
            color: var(--subtle);
            margin-left: auto;
        }

        /* ── CONTROLS ────────────────────────────────────── */
        #controls {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ctrl-btn {
            width: 36px;
            height: 36px;
            background: rgba(8, 10, 16, 0.9);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--subtle);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            backdrop-filter: blur(20px);
            font-family: var(--mono);
        }

        .ctrl-btn:hover {
            border-color: rgba(56, 189, 248, 0.5);
            color: #38bdf8;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.2);
        }

        /* ── FOCUS MODE indicator ───────────────────────── */
        #focus-label {
            position: fixed;
            top: 68px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--subtle);
            background: rgba(8, 10, 16, 0.8);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 4px 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 200;
            pointer-events: none;
        }

        /* ── LOADING ─────────────────────────────────────── */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: var(--bg);
        }

        .loading-orb {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(56, 189, 248, 0.2);
            border-top-color: #38bdf8;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--subtle);
        }

        .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 99px;
            overflow: hidden;
        }

        .loading-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            background: linear-gradient(90deg, #38bdf8, #a78bfa);
            transition: width 0.3s ease;
        }

        /* ── NODE PING animation ─────────────────────────── */
        @keyframes node-ping {
            0% {
                r: 0;
                opacity: 0.6;
            }

            100% {
                r: 40;
                opacity: 0;
            }
        }

        .node-ping {
            animation: node-ping 2s ease-out infinite;
        }
    </style>
</head>

<body>

    <div id="atmosphere"></div>
    <canvas id="particle-canvas"></canvas>

    <div id="loading">
        <div class="loading-orb"></div>
        <div class="loading-text" id="loading-msg">Initializing synapse map…</div>
        <div class="loading-bar">
            <div class="loading-fill" id="loading-fill"></div>
        </div>
    </div>

    <div id="topbar">
        <div class="logo">
            <em>Wiki</em>Brain
            <span class="logo-sep">—</span>
            <span class="logo-sub">Synapse Map</span>
        </div>
        <a href="/" class="nav-link">← Memory Index</a>
        <div id="stats-bar">
            <div class="stat"><span class="stat-val" id="stat-nodes">0</span><span class="stat-lbl">Nodes</span></div>
            <div class="stat"><span class="stat-val" id="stat-edges">0</span><span class="stat-lbl">Synapses</span>
            </div>
            <div class="stat"><span class="stat-val" id="stat-folders">0</span><span class="stat-lbl">Clusters</span>
            </div>
        </div>
    </div>

    <div id="graph"><svg id="svg">
            <defs>
                <filter id="glow-node" x="-100%" y="-100%" width="300%" height="300%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <filter id="glow-link" x="-200%" y="-200%" width="500%" height="500%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <filter id="glow-strong" x="-200%" y="-200%" width="500%" height="500%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
        </svg></div>

    <div id="tooltip">
        <div class="tt-inner">
            <div class="tt-folder" id="tt-folder"></div>
            <div class="tt-name" id="tt-name"></div>
            <div class="tt-divider"></div>
            <div class="tt-row"><span class="tt-key">Words</span><span class="tt-val" id="tt-words"></span></div>
            <div class="tt-row"><span class="tt-key">Connections</span><span class="tt-val" id="tt-links"></span></div>
            <div class="tt-row"><span class="tt-key">Cluster</span><span class="tt-val" id="tt-cluster"></span></div>
            <div class="tt-hint">Click to open · Drag to reposition</div>
        </div>
    </div>

    <div id="legend">
        <h4>Clusters</h4>
        <div id="legend-items"></div>
    </div>

    <div id="controls">
        <button class="ctrl-btn" id="zoom-in" title="Zoom in">+</button>
        <button class="ctrl-btn" id="zoom-out" title="Zoom out">−</button>
        <button class="ctrl-btn" id="reset" title="Reset view">⊙</button>
    </div>

    <div id="focus-label" id="focus-label">FOCUS MODE — click canvas to exit</div>

    <script>
        /* ============================================================
           PALETTE  — one vivid color per folder
           ============================================================ */
        const PALETTE = [
            '#38bdf8', // sky
            '#a78bfa', // violet
            '#34d399', // emerald
            '#fb923c', // orange
            '#f472b6', // pink
            '#facc15', // yellow
            '#60a5fa', // blue
            '#f87171', // red
            '#4ade80', // green
            '#e879f9', // fuchsia
            '#2dd4bf', // teal
            '#a3e635', // lime
        ];

        function folderColor(folder, folderList) {
            const idx = folderList.indexOf(folder);
            return PALETTE[idx % PALETTE.length];
        }

        /* ============================================================
           PARSE
           ============================================================ */
        function parseKey(key) {
            const parts = key.split(':');
            return { key, folder: parts[1] || 'misc', name: parts.slice(2).join('/') || key };
        }

        function extractLinks(content, allKeys) {
            const out = [];
            const re = /\[\[([^\]]+)\]\]/g;
            let m;
            while ((m = re.exec(content)) !== null) {
                const t = m[1];
                const found = allKeys.find(k => k.endsWith(':' + t) || k.includes(t));
                if (found) out.push(found);
            }
            return out;
        }

        /* ============================================================
           LOAD DATA
           ============================================================ */
        function setLoading(msg, pct) {
            document.getElementById('loading-msg').textContent = msg;
            document.getElementById('loading-fill').style.width = pct + '%';
        }

        async function buildGraph() {
            setLoading('Fetching memory index…', 10);
            const listRes = await fetch('/api/list');
            const listData = await listRes.json();
            const keys = Array.isArray(listData) ? listData : (listData.keys || []);

            const pages = [];
            const links = [];
            const total = keys.length;

            for (let i = 0; i < total; i++) {
                const key = keys[i];
                setLoading(`Loading node ${i + 1} / ${total}…`, 10 + ((i / total) * 80));
                const pageRes = await fetch('/api/page?key=' + encodeURIComponent(key));
                const pageData = await pageRes.json();
                const content = pageData.content || '';
                const words = content.split(/\s+/).filter(Boolean).length;
                const parsed = parseKey(key);
                pages.push({ ...parsed, words, content, linkCount: 0 });

                for (const t of extractLinks(content, keys)) {
                    if (t !== key) links.push({ source: key, target: t });
                }
            }

            // Degree count
            const degree = {};
            links.forEach(l => {
                degree[l.source] = (degree[l.source] || 0) + 1;
                degree[l.target] = (degree[l.target] || 0) + 1;
            });
            pages.forEach(p => { p.linkCount = degree[p.key] || 0; });

            setLoading('Rendering synapse map…', 95);
            return { pages, links };
        }

        /* ============================================================
           NODE RADIUS
           ============================================================ */
        function nodeR(d) {
            const base = Math.max(5, Math.min(18, Math.sqrt(d.words) * 0.9));
            const bonus = Math.min(10, d.linkCount * 1.5);
            return base + bonus;
        }

        /* ============================================================
           PARTICLES (ambient background dots)
           ============================================================ */
        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, particles;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }

            function makeParticle() {
                return {
                    x: Math.random() * W, y: Math.random() * H,
                    r: Math.random() * 1.2 + 0.3,
                    vx: (Math.random() - 0.5) * 0.12,
                    vy: (Math.random() - 0.5) * 0.12,
                    alpha: Math.random() * 0.25 + 0.05,
                    pulse: Math.random() * Math.PI * 2,
                };
            }

            resize();
            particles = Array.from({ length: 120 }, makeParticle);
            window.addEventListener('resize', resize);

            function frame() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.pulse += 0.01;
                    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                    const a = p.alpha * (0.7 + 0.3 * Math.sin(p.pulse));
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(168,180,210,${a})`;
                    ctx.fill();
                });
                requestAnimationFrame(frame);
            }
            frame();
        }

        /* ============================================================
           MAIN RENDER
           ============================================================ */
        async function render() {
            initParticles();

            const { pages, links } = await buildGraph();
            document.getElementById('loading').style.display = 'none';

            const folders = [...new Set(pages.map(p => p.folder))].sort();
            const colorMap = {};
            folders.forEach(f => { colorMap[f] = folderColor(f, folders); });

            // Stats
            document.getElementById('stat-nodes').textContent = pages.length;
            document.getElementById('stat-edges').textContent = links.length;
            document.getElementById('stat-folders').textContent = folders.length;

            // Legend
            const legendEl = document.getElementById('legend-items');
            const folderCount = {};
            pages.forEach(p => { folderCount[p.folder] = (folderCount[p.folder] || 0) + 1; });
            folders.forEach(f => {
                const c = colorMap[f];
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.dataset.folder = f;
                item.innerHTML = `
      <div class="legend-glyph">
        <div class="legend-glyph-ring" style="color:${c}; border-color:${c};"></div>
        <div class="legend-glyph-circle" style="background:${c};"></div>
      </div>
      <span class="legend-name">${f}</span>
      <span class="legend-count">${folderCount[f]}</span>`;
                item.addEventListener('click', () => focusFolder(f));
                legendEl.appendChild(item);
            });

            /* SVG setup */
            const svg = d3.select('#svg');
            const W = window.innerWidth;
            const H = window.innerHeight - 52;
            const g = svg.append('g');

            /* Zoom */
            const zoom = d3.zoom()
                .scaleExtent([0.05, 6])
                .on('zoom', e => g.attr('transform', e.transform));
            svg.call(zoom);

            document.getElementById('zoom-in').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.35);
            document.getElementById('zoom-out').onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 0.74);
            document.getElementById('reset').onclick = () => svg.transition().duration(600)
                .call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2));

            /* Simulation */
            const simulation = d3.forceSimulation(pages)
                .force('link', d3.forceLink(links).id(d => d.key).distance(d => {
                    const sr = nodeR(d.source), tr = nodeR(d.target);
                    return 80 + sr + tr + Math.random() * 30;
                }).strength(0.4))
                .force('charge', d3.forceManyBody().strength(d => -350 - d.linkCount * 20))
                .force('center', d3.forceCenter(W / 2, H / 2))
                .force('collision', d3.forceCollide().radius(d => nodeR(d) + 24).strength(0.9))
                .alphaDecay(0.015);

            /* ── LINKS ────────────────────────────────────── */
            const linkG = g.append('g').attr('class', 'links');

            // Glow layer
            const linkGlow = linkG.selectAll('.link-glow').data(links).join('line')
                .attr('class', 'link-glow')
                .attr('stroke', d => colorMap[pages.find(p => p.key === (d.source.key || d.source))?.folder] || '#38bdf8')
                .attr('stroke-width', 3).attr('stroke-opacity', 0)
                .attr('filter', 'url(#glow-link)');

            // Base layer
            const linkBase = linkG.selectAll('.link-base').data(links).join('line')
                .attr('class', 'link-base')
                .attr('stroke', '#1e2530').attr('stroke-width', 1)
                .attr('stroke-opacity', 0.5);

            // Animated dash flow layer
            const linkFlow = linkG.selectAll('.link-flow').data(links).join('line')
                .attr('class', 'link-flow')
                .attr('stroke', d => colorMap[pages.find(p => p.key === (d.source.key || d.source))?.folder] || '#38bdf8')
                .attr('stroke-width', 1.5)
                .attr('stroke-dasharray', '3 14')
                .attr('stroke-opacity', 0);

            // Animate dash offset
            (function animateFlow() {
                let offset = 0;
                function tick() {
                    offset -= 0.5;
                    linkFlow.attr('stroke-dashoffset', offset);
                    requestAnimationFrame(tick);
                }
                tick();
            })();

            /* ── NODES ────────────────────────────────────── */
            const nodeG = g.append('g').attr('class', 'nodes');

            const nodeEl = nodeG.selectAll('.node').data(pages).join('g')
                .attr('class', 'node')
                .attr('cursor', 'pointer')
                .call(d3.drag()
                    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
                );

            // Ping ring (animated)
            nodeEl.append('circle')
                .attr('class', 'node-ping')
                .attr('r', d => nodeR(d) + 2)
                .attr('fill', 'none')
                .attr('stroke', d => colorMap[d.folder])
                .attr('stroke-width', 1)
                .attr('stroke-opacity', 0.15)
                .each(function (d) {
                    // Stagger the ping animation
                    d3.select(this)
                        .attr('style', `animation-delay: ${Math.random() * 3}s; animation-duration: ${2.5 + Math.random() * 2}s`);
                });

            // Outer halo
            nodeEl.append('circle')
                .attr('class', 'node-outer')
                .attr('r', d => nodeR(d) + 6)
                .attr('fill', 'none')
                .attr('stroke', d => colorMap[d.folder])
                .attr('stroke-width', 1)
                .attr('stroke-opacity', 0.12);

            // Main glow (blurred layer behind)
            nodeEl.append('circle')
                .attr('r', d => nodeR(d) * 1.8)
                .attr('fill', d => colorMap[d.folder])
                .attr('fill-opacity', 0.04)
                .attr('filter', 'url(#glow-strong)');

            // Inner circle
            nodeEl.append('circle')
                .attr('class', 'node-inner')
                .attr('r', d => nodeR(d))
                .attr('fill', d => colorMap[d.folder])
                .attr('fill-opacity', 0.18)
                .attr('stroke', d => colorMap[d.folder])
                .attr('stroke-width', 1.5)
                .attr('stroke-opacity', 0.7)
                .attr('filter', 'url(#glow-node)');

            // Core dot
            nodeEl.append('circle')
                .attr('class', 'node-core')
                .attr('r', d => Math.max(2, nodeR(d) * 0.4))
                .attr('fill', d => colorMap[d.folder])
                .attr('fill-opacity', 0.9)
                .attr('filter', 'url(#glow-node)');

            // Label
            nodeEl.append('text')
                .attr('class', 'node-label')
                .attr('dy', d => nodeR(d) + 14)
                .attr('text-anchor', 'middle')
                .text(d => d.name.length > 20 ? d.name.slice(0, 18) + '…' : d.name);

            /* ── TOOLTIP ──────────────────────────────────── */
            const tooltipEl = document.getElementById('tooltip');

            nodeEl
                .on('mouseover', function (e, d) {
                    const c = colorMap[d.folder];
                    document.getElementById('tt-folder').textContent = d.folder;
                    document.getElementById('tt-folder').style.color = c;
                    document.getElementById('tt-name').textContent = d.name;
                    document.getElementById('tt-words').textContent = d.words.toLocaleString();
                    document.getElementById('tt-links').textContent = d.linkCount;
                    document.getElementById('tt-cluster').textContent = d.folder;
                    tooltipEl.style.opacity = '1';

                    // Highlight connected
                    const connected = new Set([d.key]);
                    links.forEach(l => {
                        if (l.source.key === d.key) connected.add(l.target.key);
                        if (l.target.key === d.key) connected.add(l.source.key);
                    });

                    // Dim non-connected nodes
                    nodeEl.selectAll('circle.node-inner')
                        .attr('fill-opacity', n => connected.has(n.key) ? 0.35 : 0.04)
                        .attr('stroke-opacity', n => connected.has(n.key) ? 1 : 0.1);
                    nodeEl.selectAll('circle.node-core')
                        .attr('fill-opacity', n => connected.has(n.key) ? 1 : 0.1);
                    nodeEl.selectAll('text.node-label')
                        .style('fill', n => connected.has(n.key) ? '#e8ecf4' : '#232830')
                        .style('font-size', n => n.key === d.key ? '11px' : '9px');

                    // Brighten links
                    linkGlow.attr('stroke-opacity', l =>
                        (l.source.key === d.key || l.target.key === d.key) ? 0.6 : 0);
                    linkBase.attr('stroke-opacity', l =>
                        (l.source.key === d.key || l.target.key === d.key) ? 0.8 : 0.08);
                    linkFlow.attr('stroke-opacity', l =>
                        (l.source.key === d.key || l.target.key === d.key) ? 0.8 : 0);
                })
                .on('mousemove', e => {
                    const x = e.clientX, y = e.clientY;
                    const flip = x > window.innerWidth - 240;
                    tooltipEl.style.left = flip ? (x - 220) + 'px' : (x + 16) + 'px';
                    tooltipEl.style.top = (y - 60) + 'px';
                })
                .on('mouseleave', () => {
                    tooltipEl.style.opacity = '0';
                    nodeEl.selectAll('circle.node-inner')
                        .attr('fill-opacity', 0.18).attr('stroke-opacity', 0.7);
                    nodeEl.selectAll('circle.node-core').attr('fill-opacity', 0.9);
                    nodeEl.selectAll('text.node-label').style('fill', '#5a6070').style('font-size', '9px');
                    linkGlow.attr('stroke-opacity', 0);
                    linkBase.attr('stroke', '#1e2530').attr('stroke-opacity', 0.5);
                    linkFlow.attr('stroke-opacity', 0);
                })
                .on('click', (e, d) => {
                    window.location.href = '/?openKey=' + encodeURIComponent(d.key);
                });

            /* ── FOLDER FOCUS ─────────────────────────────── */
            let focusedFolder = null;
            const focusLabel = document.getElementById('focus-label');

            function focusFolder(folder) {
                if (focusedFolder === folder) { clearFocus(); return; }
                focusedFolder = folder;
                focusLabel.textContent = `CLUSTER: ${folder.toUpperCase()} — click legend again to exit`;
                focusLabel.style.opacity = '1';

                nodeEl.selectAll('circle.node-inner')
                    .attr('fill-opacity', n => n.folder === folder ? 0.35 : 0.03)
                    .attr('stroke-opacity', n => n.folder === folder ? 0.8 : 0.08);
                nodeEl.selectAll('circle.node-core')
                    .attr('fill-opacity', n => n.folder === folder ? 1 : 0.05);
                nodeEl.selectAll('text.node-label')
                    .style('fill', n => n.folder === folder ? '#e8ecf4' : '#1c2028');
                linkBase.attr('stroke-opacity', l => {
                    const sf = pages.find(p => p.key === l.source.key)?.folder;
                    const tf = pages.find(p => p.key === l.target.key)?.folder;
                    return (sf === folder || tf === folder) ? 0.6 : 0.04;
                });
                linkGlow.attr('stroke-opacity', l => {
                    const sf = pages.find(p => p.key === l.source.key)?.folder;
                    const tf = pages.find(p => p.key === l.target.key)?.folder;
                    return (sf === folder && tf === folder) ? 0.7 : 0;
                });
            }

            function clearFocus() {
                focusedFolder = null;
                focusLabel.style.opacity = '0';
                nodeEl.selectAll('circle.node-inner').attr('fill-opacity', 0.18).attr('stroke-opacity', 0.7);
                nodeEl.selectAll('circle.node-core').attr('fill-opacity', 0.9);
                nodeEl.selectAll('text.node-label').style('fill', '#5a6070');
                linkBase.attr('stroke-opacity', 0.5);
                linkGlow.attr('stroke-opacity', 0);
            }

            svg.on('click', (e) => {
                if (e.target === svg.node() || e.target.tagName === 'svg') clearFocus();
            });

            /* ── SIMULATION TICK ──────────────────────────── */
            simulation.on('tick', () => {
                function lx1(d) { return d.source.x; } function ly1(d) { return d.source.y; }
                function lx2(d) { return d.target.x; } function ly2(d) { return d.target.y; }

                linkBase.attr('x1', lx1).attr('y1', ly1).attr('x2', lx2).attr('y2', ly2);
                linkGlow.attr('x1', lx1).attr('y1', ly1).attr('x2', lx2).attr('y2', ly2);
                linkFlow.attr('x1', lx1).attr('y1', ly1).attr('x2', lx2).attr('y2', ly2);
                nodeEl.attr('transform', d => `translate(${d.x},${d.y})`);
            });

            /* Initial center */
            svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2));
        }

        render().catch(err => {
            console.error(err);
            document.getElementById('loading-msg').textContent = 'Failed to load: ' + err.message;
            document.getElementById('loading-fill').style.background = '#f87171';
        });
    </script>
</body>

</html>
