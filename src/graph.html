<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiBrain — Synapse Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #040508;
            --border: rgba(255, 255, 255, 0.07);
            --subtle: #5a6070;
            --body: #a8b0c0;
            --bright: #e8ecf4;
            --mono: 'DM Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--body);
            font-family: var(--mono);
            overflow: hidden;
        }

        #atmo {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 60% 55% at 20% 25%, rgba(56, 189, 248, 0.08) 0%, transparent 65%),
                radial-gradient(ellipse 55% 60% at 80% 75%, rgba(168, 85, 247, 0.08) 0%, transparent 65%),
                radial-gradient(ellipse 70% 40% at 55% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 55%);
        }

        #atmo::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255, 255, 255, 0.005) 3px, rgba(255, 255, 255, 0.005) 4px);
        }

        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* TOPBAR */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 54px;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 0 24px;
            background: rgba(4, 5, 8, 0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 200;
        }

        .logo {
            font-family: var(--display);
            font-size: 16px;
            font-weight: 800;
            color: var(--bright);
        }

        .logo em {
            color: #38bdf8;
            font-style: normal;
        }

        .logo-sep {
            color: #252830;
            margin: 0 8px;
        }

        .logo-sub {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.15em;
            color: var(--subtle);
            text-transform: uppercase;
        }

        .nav-link {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--subtle);
            text-decoration: none;
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.4);
            background: rgba(56, 189, 248, 0.06);
        }

        #stats-bar {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-val {
            font-family: var(--display);
            font-size: 20px;
            font-weight: 800;
            color: var(--bright);
            line-height: 1;
        }

        .stat-lbl {
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-top: 2px;
        }

        /* EDGE LEGEND */
        #edge-legend {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 16px;
            border-left: 1px solid var(--border);
            margin-left: 8px;
        }

        .edge-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 9px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--subtle);
        }

        .edge-legend-line {
            width: 24px;
            height: 2px;
            border-radius: 1px;
        }

        .edge-legend-dash {
            width: 24px;
            height: 0;
            border-top: 2px dashed;
            opacity: 0.5;
        }

        /* GRAPH */
        #graph {
            position: fixed;
            inset: 54px 0 0 0;
            z-index: 10;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .node-label {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 500;
            fill: #6b7585;
            letter-spacing: 0.03em;
            pointer-events: none;
            text-transform: uppercase;
        }

        /* TOOLTIP */
        #tooltip {
            position: fixed;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 300;
            min-width: 220px;
        }

        .tt-inner {
            background: rgba(4, 5, 10, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 16px 18px;
            backdrop-filter: blur(24px);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .tt-folder {
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .tt-name {
            font-family: var(--display);
            font-size: 16px;
            font-weight: 700;
            color: var(--bright);
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .tt-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin-bottom: 10px;
        }

        .tt-row {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-bottom: 5px;
        }

        .tt-key {
            color: var(--subtle);
        }

        .tt-val {
            color: var(--body);
            font-weight: 500;
        }

        .tt-keywords {
            margin-top: 10px;
        }

        .tt-kw-label {
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-bottom: 6px;
        }

        .tt-kw-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .tt-kw-chip {
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--body);
            letter-spacing: 0.04em;
        }

        .tt-hint {
            font-size: 9px;
            color: #3a3d42;
            margin-top: 12px;
            letter-spacing: 0.05em;
        }

        /* LEGEND */
        #legend {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 200;
            background: rgba(4, 5, 10, 0.94);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            backdrop-filter: blur(24px);
            min-width: 175px;
        }

        #legend h4 {
            font-size: 8px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--subtle);
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-item:hover {
            opacity: 0.7;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-name {
            font-size: 11px;
            color: var(--body);
            flex: 1;
        }

        .legend-count {
            font-size: 9px;
            color: var(--subtle);
        }

        /* CONTROLS */
        #controls {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ctrl-btn {
            width: 38px;
            height: 38px;
            background: rgba(4, 5, 10, 0.94);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--subtle);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            backdrop-filter: blur(24px);
        }

        .ctrl-btn:hover {
            border-color: rgba(56, 189, 248, 0.5);
            color: #38bdf8;
            box-shadow: 0 0 14px rgba(56, 189, 248, 0.2);
        }

        /* SIMILARITY THRESHOLD SLIDER */
        #sim-control {
            position: fixed;
            bottom: 24px;
            right: 72px;
            z-index: 200;
            background: rgba(4, 5, 10, 0.94);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            backdrop-filter: blur(24px);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 160px;
        }

        #sim-control label {
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--subtle);
        }

        #sim-control .sim-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #sim-slider {
            flex: 1;
            accent-color: #a78bfa;
            cursor: pointer;
        }

        #sim-val {
            font-size: 10px;
            color: var(--bright);
            font-family: var(--mono);
            min-width: 28px;
        }

        #focus-label {
            position: fixed;
            top: 66px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--subtle);
            background: rgba(4, 5, 10, 0.92);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 5px 16px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 200;
            pointer-events: none;
            white-space: nowrap;
        }

        /* LOADING */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 400;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: var(--bg);
        }

        .loading-orb {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(56, 189, 248, 0.12);
            border-top-color: #38bdf8;
            animation: spin 0.9s linear infinite;
            box-shadow: 0 0 28px rgba(56, 189, 248, 0.25);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--subtle);
        }

        .loading-bar {
            width: 240px;
            height: 2px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 99px;
            overflow: hidden;
        }

        .loading-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            background: linear-gradient(90deg, #38bdf8, #a78bfa);
            transition: width 0.25s ease;
        }

        @keyframes node-ping {
            0% {
                stroke-opacity: 0.45;
                r: 0;
            }

            80% {
                stroke-opacity: 0;
            }

            100% {
                stroke-opacity: 0;
                r: 80;
            }
        }

        .node-ping {
            animation: node-ping 3.5s ease-out infinite;
        }
    </style>
</head>

<body>

    <div id="atmo"></div>
    <canvas id="particle-canvas"></canvas>

    <div id="loading">
        <div class="loading-orb"></div>
        <div class="loading-text" id="loading-msg">Initializing synapse map…</div>
        <div class="loading-bar">
            <div class="loading-fill" id="loading-fill"></div>
        </div>
    </div>

    <div id="topbar">
        <div class="logo"><em>Wiki</em>Brain <span class="logo-sep">—</span> <span class="logo-sub">Synapse Map</span>
        </div>
        <a href="/" class="nav-link">← Memory Index</a>
        <div id="edge-legend">
            <div class="edge-legend-item">
                <div class="edge-legend-line" style="background:#38bdf8;"></div>
                Wikilink
            </div>
            <div class="edge-legend-item">
                <div class="edge-legend-dash" style="border-color:#a78bfa;"></div>
                Similarity
            </div>
        </div>
        <div id="stats-bar">
            <div class="stat"><span class="stat-val" id="stat-nodes">0</span><span class="stat-lbl">Nodes</span></div>
            <div class="stat"><span class="stat-val" id="stat-edges">0</span><span class="stat-lbl">Wikilinks</span>
            </div>
            <div class="stat"><span class="stat-val" id="stat-sim">0</span><span class="stat-lbl">Similarities</span>
            </div>
            <div class="stat"><span class="stat-val" id="stat-folders">0</span><span class="stat-lbl">Clusters</span>
            </div>
        </div>
    </div>

    <div id="graph"><svg id="svg">
            <defs>
                <filter id="glow-sm" x="-60%" y="-60%" width="220%" height="220%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b" />
                    <feMerge>
                        <feMergeNode in="b" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <filter id="glow-lg" x="-150%" y="-150%" width="400%" height="400%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b" />
                    <feMerge>
                        <feMergeNode in="b" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
                <filter id="glow-edge" x="-100%" y="-100%" width="300%" height="300%">
                    <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b" />
                    <feMerge>
                        <feMergeNode in="b" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
        </svg></div>

    <div id="tooltip">
        <div class="tt-inner">
            <div class="tt-folder" id="tt-folder"></div>
            <div class="tt-name" id="tt-name"></div>
            <div class="tt-divider"></div>
            <div class="tt-row"><span class="tt-key">Words</span><span class="tt-val" id="tt-words"></span></div>
            <div class="tt-row"><span class="tt-key">Wikilinks</span><span class="tt-val" id="tt-links"></span></div>
            <div class="tt-row"><span class="tt-key">Similar to</span><span class="tt-val" id="tt-sim"></span></div>
            <div class="tt-row"><span class="tt-key">Cluster</span><span class="tt-val" id="tt-cluster"></span></div>
            <div class="tt-keywords">
                <div class="tt-kw-label">Top Keywords</div>
                <div class="tt-kw-chips" id="tt-chips"></div>
            </div>
            <div class="tt-hint">Click to open · Drag to reposition</div>
        </div>
    </div>

    <div id="legend">
        <h4>Clusters</h4>
        <div id="legend-items"></div>
    </div>

    <div id="sim-control">
        <label>Similarity Threshold</label>
        <div class="sim-row">
            <input type="range" id="sim-slider" min="1" max="10" value="4" step="1">
            <span id="sim-val">4</span>
        </div>
        <label style="color:rgba(90,96,112,0.6);font-size:8px;">shared keywords needed</label>
    </div>

    <div id="controls">
        <button class="ctrl-btn" id="btn-zi" title="Zoom in">+</button>
        <button class="ctrl-btn" id="btn-zo" title="Zoom out">−</button>
        <button class="ctrl-btn" id="btn-rst" title="Reset view">⊙</button>
    </div>

    <div id="focus-label"></div>

    <script>
        /* ── PALETTE ───────────────────────────────── */
        const PAL = [
            '#38bdf8', '#a78bfa', '#34d399', '#fb923c',
            '#f472b6', '#facc15', '#60a5fa', '#f87171',
            '#4ade80', '#e879f9', '#2dd4bf', '#a3e635',
        ];

        /* ── STOPWORDS (ignored in similarity) ─────── */
        const STOP = new Set([
            'the', 'a', 'an', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with',
            'is', 'are', 'was', 'were', 'be', 'been', 'being', 'have', 'has', 'had', 'do',
            'does', 'did', 'will', 'would', 'could', 'should', 'may', 'might', 'shall',
            'this', 'that', 'these', 'those', 'it', 'its', 'i', 'we', 'you', 'he', 'she',
            'they', 'what', 'which', 'who', 'when', 'where', 'how', 'all', 'more', 'also',
            'from', 'as', 'by', 'not', 'so', 'if', 'then', 'than', 'into', 'about', 'can',
            'just', 'up', 'out', 'there', 'their', 'our', 'your', 'my', 'his', 'her', 'we',
            'one', 'two', 'three', 'new', 'use', 'used', 'using', 'each', 'some', 'any',
            'after', 'before', 'over', 'under', 'through', 'between', 'during', 'without',
            'within', 'along', 'across', 'behind', 'beyond', 'around', 'among', 'while',
        ]);

        /* ── UTILS ─────────────────────────────────── */
        function parseKey(key) {
            const p = key.split(':');
            return { key, folder: p[1] || 'misc', name: p.slice(2).join('/') || key };
        }
        function setLoad(msg, pct) {
            document.getElementById('loading-msg').textContent = msg;
            document.getElementById('loading-fill').style.width = pct + '%';
        }

        /* ── KEYWORD EXTRACTION ─────────────────────
           Extract meaningful words from content,
           strip markdown, stopwords, short words      */
        function extractKeywords(content) {
            const clean = content
                .replace(/```[\s\S]*?```/g, '')   // code blocks
                .replace(/`[^`]+`/g, '')          // inline code
                .replace(/#+\s/g, '')             // headings
                .replace(/\[\[([^\]]+)\]\]/g, '$1') // wikilinks → text
                .replace(/[^a-zA-Z0-9\s\-_]/g, ' ')
                .toLowerCase();

            const words = clean.split(/\s+/).filter(w =>
                w.length > 3 && !STOP.has(w) && !/^\d+$/.test(w)
            );

            // TF: count frequency
            const freq = {};
            words.forEach(w => { freq[w] = (freq[w] || 0) + 1; });

            // Sort by frequency, return top 40
            return Object.entries(freq)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 40)
                .map(([w, c]) => ({ word: w, count: c }));
        }

        /* ── SIMILARITY SCORE ───────────────────────
           Count shared keywords weighted by frequency */
        function similarity(kwA, kwB) {
            const mapB = {};
            kwB.forEach(k => { mapB[k.word] = k.count; });
            let score = 0;
            kwA.forEach(k => {
                if (mapB[k.word]) score += Math.min(k.count, mapB[k.word]);
            });
            return score;
        }

        /* ── WIKILINK EXTRACTION ────────────────────── */
        function resolveLinks(content, pages) {
            const out = [];
            const re = /\[\[([^\]|\n#]+)/g;
            let m;
            while ((m = re.exec(content)) !== null) {
                const raw = m[1].trim();
                if (!raw) continue;
                const rLow = raw.toLowerCase();
                const rSlug = rLow.replace(/\s+/g, '-');
                const hit = pages.find(p => {
                    const seg = p.key.split(':').slice(2).join('/');
                    const sLow = seg.toLowerCase();
                    const sSlug = sLow.replace(/\s+/g, '-');
                    const nLow = p.name.toLowerCase();
                    const nSlug = nLow.replace(/\s+/g, '-');
                    return seg === raw || sLow === rLow || sSlug === rSlug
                        || p.name === raw || nLow === rLow || nSlug === rSlug || p.key === raw;
                });
                if (hit && !out.includes(hit.key)) out.push(hit.key);
            }
            return out;
        }

        /* ── NODE SIZE ──────────────────────────────── */
        function nodeR(d) {
            const base = Math.max(20, Math.min(50, Math.sqrt(d.words || 20) * 2.4));
            const bonus = Math.min(24, (d.totalDegree || 0) * 3.5);
            return base + bonus;
        }

        /* ── PARTICLES ──────────────────────────────── */
        function initParticles() {
            const cv = document.getElementById('particle-canvas');
            const cx = cv.getContext('2d');
            let W, H, pts;
            const resize = () => { W = cv.width = innerWidth; H = cv.height = innerHeight; };
            const mkPt = () => ({
                x: Math.random() * W, y: Math.random() * H,
                r: Math.random() * 1.5 + 0.3,
                vx: (Math.random() - .5) * 0.08, vy: (Math.random() - .5) * 0.08,
                a: Math.random() * 0.18 + 0.04, ph: Math.random() * Math.PI * 2,
            });
            resize();
            pts = Array.from({ length: 140 }, mkPt);
            window.addEventListener('resize', resize);
            (function f() {
                cx.clearRect(0, 0, W, H);
                pts.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.ph += 0.007;
                    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                    const a = p.a * (0.6 + 0.4 * Math.sin(p.ph));
                    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    cx.fillStyle = `rgba(155,170,205,${a})`; cx.fill();
                });
                requestAnimationFrame(f);
            })();
        }

        /* ── BUILD GRAPH DATA ───────────────────────── */
        async function buildGraph() {
            setLoad('Fetching memory index…', 5);
            const lRes = await fetch('/api/list');
            if (!lRes.ok) throw new Error('/api/list HTTP ' + lRes.status);
            const lData = await lRes.json();
            const keys = Array.isArray(lData) ? lData : (lData.keys || []);
            const total = keys.length;

            // Pass 1 — fetch all pages + extract keywords
            const pages = [];
            const contentMap = {};
            const kwMap = {};  // key → [{word,count}]

            for (let i = 0; i < total; i++) {
                const key = keys[i];
                setLoad(`Loading ${i + 1}/${total}…`, 5 + (i / total) * 60);
                try {
                    const r = await fetch('/api/page?key=' + encodeURIComponent(key));
                    const d = await r.json();
                    const c = d.content || '';
                    contentMap[key] = c;
                    kwMap[key] = extractKeywords(c);
                    const words = c.split(/\s+/).filter(Boolean).length;
                    pages.push({ ...parseKey(key), words, keywords: kwMap[key], linkCount: 0, simCount: 0, totalDegree: 0 });
                } catch (_) {
                    contentMap[key] = ''; kwMap[key] = [];
                    pages.push({ ...parseKey(key), words: 20, keywords: [], linkCount: 0, simCount: 0, totalDegree: 0 });
                }
            }

            // Pass 2 — wikilinks
            setLoad('Resolving wikilinks…', 68);
            const wikiLinks = [];
            const wikiSeen = new Set();
            for (const page of pages) {
                for (const tKey of resolveLinks(contentMap[page.key] || '', pages)) {
                    if (tKey === page.key) continue;
                    const id = [page.key, tKey].sort().join('\x01');
                    if (wikiSeen.has(id)) continue;
                    wikiSeen.add(id);
                    wikiLinks.push({ source: page.key, target: tKey, type: 'wiki' });
                }
            }

            // Pass 3 — similarity edges (computed client-side, no AI needed)
            setLoad('Computing semantic similarity…', 78);
            const simLinks = [];
            const simScores = {}; // key → [{target,score}]
            for (let i = 0; i < pages.length; i++) {
                for (let j = i + 1; j < pages.length; j++) {
                    const pa = pages[i], pb = pages[j];
                    // Skip if already wikilinked
                    const wid = [pa.key, pb.key].sort().join('\x01');
                    if (wikiSeen.has(wid)) continue;
                    const score = similarity(pa.keywords, pb.keywords);
                    if (score > 0) {
                        if (!simScores[pa.key]) simScores[pa.key] = [];
                        if (!simScores[pb.key]) simScores[pb.key] = [];
                        simScores[pa.key].push({ target: pb.key, score });
                        simScores[pb.key].push({ target: pa.key, score });
                    }
                }
            }
            // Store sim scores on pages for tooltip
            pages.forEach(p => { p.simScores = (simScores[p.key] || []).sort((a, b) => b.score - a.score); });

            // Will be filtered by threshold slider — store all with score
            const allSimLinks = [];
            const simSeen = new Set();
            for (const page of pages) {
                for (const { target, score } of (simScores[page.key] || [])) {
                    const id = [page.key, target].sort().join('\x01');
                    if (simSeen.has(id)) continue;
                    simSeen.add(id);
                    allSimLinks.push({ source: page.key, target, type: 'sim', score });
                }
            }

            // Degree counts
            const deg = {};
            wikiLinks.forEach(l => { deg[l.source] = (deg[l.source] || 0) + 1; deg[l.target] = (deg[l.target] || 0) + 1; });
            pages.forEach(p => {
                p.linkCount = deg[p.key] || 0;
                p.totalDegree = p.linkCount;
            });

            setLoad('Rendering…', 96);
            return { pages, wikiLinks, allSimLinks };
        }

        /* ── MAIN ───────────────────────────────────── */
        async function render() {
            initParticles();
            const { pages, wikiLinks, allSimLinks } = await buildGraph();
            document.getElementById('loading').style.display = 'none';

            const folders = [...new Set(pages.map(p => p.folder))].sort();
            const clr = f => PAL[folders.indexOf(f) % PAL.length];

            // Stats
            document.getElementById('stat-nodes').textContent = pages.length;
            document.getElementById('stat-edges').textContent = wikiLinks.length;
            document.getElementById('stat-folders').textContent = folders.length;

            // Legend
            const fCount = {};
            pages.forEach(p => { fCount[p.folder] = (fCount[p.folder] || 0) + 1; });
            const lgEl = document.getElementById('legend-items');
            folders.forEach(f => {
                const c = clr(f), el = document.createElement('div');
                el.className = 'legend-item';
                el.innerHTML = `<div class="legend-dot" style="background:${c};box-shadow:0 0 8px ${c}70;"></div>
      <span class="legend-name">${f}</span><span class="legend-count">${fCount[f]}</span>`;
                el.onclick = () => focusFolder(f);
                lgEl.appendChild(el);
            });

            /* SVG + zoom */
            const svg = d3.select('#svg');
            const W = window.innerWidth;
            const H = window.innerHeight - 54;
            const g = svg.append('g');

            const zoom = d3.zoom().scaleExtent([0.04, 8])
                .on('zoom', e => g.attr('transform', e.transform));
            svg.call(zoom);

            document.getElementById('btn-zi').onclick = () => svg.transition().duration(280).call(zoom.scaleBy, 1.4);
            document.getElementById('btn-zo').onclick = () => svg.transition().duration(280).call(zoom.scaleBy, 0.72);
            document.getElementById('btn-rst').onclick = () => svg.transition().duration(600)
                .call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(0.82));

            /* ── THRESHOLD SLIDER ────────────────────── */
            let threshold = 4;
            const slider = document.getElementById('sim-slider');
            const simVal = document.getElementById('sim-val');

            function getSimLinks(t) {
                return allSimLinks.filter(l => l.score >= t);
            }

            /* ── SIMULATION ──────────────────────────── */
            // Combine wikilinks + filtered simlinks for simulation
            function makeSimData(t) {
                return [...wikiLinks, ...getSimLinks(t)];
            }

            let currentThreshold = threshold;
            let allLinks = makeSimData(currentThreshold);

            const sim = d3.forceSimulation(pages)
                .force('link', d3.forceLink(allLinks).id(d => d.key)
                    .distance(d => {
                        const r1 = nodeR(d.source), r2 = nodeR(d.target);
                        // Similarity links pull closer than wikilinks
                        return d.type === 'sim' ? r1 + r2 + 35 : r1 + r2 + 55;
                    })
                    .strength(d => d.type === 'sim' ? 0.25 : 0.55))
                .force('charge', d3.forceManyBody()
                    .strength(d => -180 - d.totalDegree * 25)
                    .distanceMax(350))
                .force('center', d3.forceCenter(W / 2, H / 2).strength(0.06))
                .force('collide', d3.forceCollide().radius(d => nodeR(d) + 14).strength(0.85))
                .alphaDecay(0.011)
                .velocityDecay(0.44);

            /* ── EDGE LAYERS ──────────────────────────── */
            const lG = g.append('g');

            // ─ Similarity edges (dashed, purple)
            let simGlow = lG.append('g');
            let simBase = lG.append('g');
            let simFlow = lG.append('g');

            // ─ Wikilink edges (solid, folder-colored)
            const wikiGlowG = lG.append('g');
            const wikiBaseG = lG.append('g');
            const wikiFlowG = lG.append('g');

            // Wiki edges — static (don't change with slider)
            const wGlow = wikiGlowG.selectAll('line').data(wikiLinks).join('line')
                .attr('stroke', d => { const s = pages.find(p => p.key === (d.source.key || d.source)); return s ? clr(s.folder) : '#38bdf8'; })
                .attr('stroke-width', 5).attr('stroke-opacity', 0)
                .attr('filter', 'url(#glow-edge)');

            const wBase = wikiBaseG.selectAll('line').data(wikiLinks).join('line')
                .attr('stroke', d => { const s = pages.find(p => p.key === (d.source.key || d.source)); return s ? clr(s.folder) : '#38bdf8'; })
                .attr('stroke-width', 1.8).attr('stroke-opacity', 0.30);

            const wFlow = wikiFlowG.selectAll('line').data(wikiLinks).join('line')
                .attr('stroke', d => { const s = pages.find(p => p.key === (d.source.key || d.source)); return s ? clr(s.folder) : '#38bdf8'; })
                .attr('stroke-width', 1.5).attr('stroke-dasharray', '4 10').attr('stroke-opacity', 0.12);

            // Similarity edges — rebuilt when slider changes
            let sGlow, sBase, sFlow;

            function buildSimEdges(t) {
                const sLinks = getSimLinks(t);
                document.getElementById('stat-sim').textContent = sLinks.length;

                simGlow.selectAll('*').remove();
                simBase.selectAll('*').remove();
                simFlow.selectAll('*').remove();

                sGlow = simGlow.selectAll('line').data(sLinks).join('line')
                    .attr('stroke', '#a78bfa').attr('stroke-width', 4)
                    .attr('stroke-opacity', 0).attr('filter', 'url(#glow-edge)');

                sBase = simBase.selectAll('line').data(sLinks).join('line')
                    .attr('stroke', '#a78bfa').attr('stroke-width', 1.2)
                    .attr('stroke-opacity', 0.18)
                    .attr('stroke-dasharray', '3 8');

                sFlow = simFlow.selectAll('line').data(sLinks).join('line')
                    .attr('stroke', '#a78bfa').attr('stroke-width', 1)
                    .attr('stroke-dasharray', '2 12').attr('stroke-opacity', 0.08);
            }

            buildSimEdges(currentThreshold);

            // Dash animation
            let dOff = 0;
            (function flowLoop() {
                dOff -= 0.35;
                wFlow.attr('stroke-dashoffset', dOff);
                if (sFlow) sFlow.attr('stroke-dashoffset', dOff * 0.6);
                requestAnimationFrame(flowLoop);
            })();

            /* ── SLIDER INTERACTION ────────────────────── */
            slider.addEventListener('input', function () {
                currentThreshold = +this.value;
                simVal.textContent = currentThreshold;
                buildSimEdges(currentThreshold);

                // Rebuild simulation links
                const newLinks = makeSimData(currentThreshold);
                sim.force('link', d3.forceLink(newLinks).id(d => d.key)
                    .distance(d => {
                        const r1 = nodeR(d.source || pages.find(p => p.key === d.source)),
                            r2 = nodeR(d.target || pages.find(p => p.key === d.target));
                        return d.type === 'sim' ? (r1 || 30) + (r2 || 30) + 35 : (r1 || 30) + (r2 || 30) + 55;
                    })
                    .strength(d => d.type === 'sim' ? 0.2 : 0.55));
                sim.alpha(0.3).restart();
            });

            /* ── NODES ────────────────────────────────── */
            const nG = g.append('g');
            const nEl = nG.selectAll('.nd').data(pages).join('g')
                .attr('class', 'nd').attr('cursor', 'pointer')
                .call(d3.drag()
                    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
                );

            // Ping
            nEl.append('circle').attr('class', 'node-ping')
                .attr('r', d => nodeR(d)).attr('fill', 'none')
                .attr('stroke', d => clr(d.folder)).attr('stroke-width', 1.5)
                .each(function (d) {
                    d3.select(this).attr('style',
                        `animation-delay:${(Math.random() * 5).toFixed(2)}s;animation-duration:${(3 + Math.random() * 2.5).toFixed(2)}s`);
                });

            // Outer halo
            nEl.append('circle')
                .attr('r', d => nodeR(d) + 10).attr('fill', 'none')
                .attr('stroke', d => clr(d.folder)).attr('stroke-width', 1).attr('stroke-opacity', 0.09);

            // Diffuse glow
            nEl.append('circle')
                .attr('r', d => nodeR(d) * 2.2)
                .attr('fill', d => clr(d.folder)).attr('fill-opacity', 0.055)
                .attr('filter', 'url(#glow-lg)');

            // Main body
            nEl.append('circle').attr('class', 'node-body')
                .attr('r', d => nodeR(d))
                .attr('fill', d => clr(d.folder)).attr('fill-opacity', 0.17)
                .attr('stroke', d => clr(d.folder)).attr('stroke-width', 2).attr('stroke-opacity', 0.82)
                .attr('filter', 'url(#glow-sm)');

            // Core
            nEl.append('circle').attr('class', 'node-core')
                .attr('r', d => Math.max(5, nodeR(d) * 0.38))
                .attr('fill', d => clr(d.folder)).attr('fill-opacity', 0.95)
                .attr('filter', 'url(#glow-sm)');

            // Label
            nEl.append('text').attr('class', 'node-label')
                .attr('dy', d => nodeR(d) + 17).attr('text-anchor', 'middle')
                .text(d => d.name.length > 22 ? d.name.slice(0, 20) + '…' : d.name);

            /* ── TOOLTIP ──────────────────────────────── */
            const ttEl = document.getElementById('tooltip');

            nEl
                .on('mouseover', function (e, d) {
                    const c = clr(d.folder);
                    document.getElementById('tt-folder').textContent = d.folder;
                    document.getElementById('tt-folder').style.color = c;
                    document.getElementById('tt-name').textContent = d.name;
                    document.getElementById('tt-words').textContent = (d.words || 0).toLocaleString();
                    document.getElementById('tt-links').textContent = d.linkCount || 0;
                    document.getElementById('tt-cluster').textContent = d.folder;

                    // Top similar pages
                    const topSim = (d.simScores || [])
                        .filter(s => s.score >= currentThreshold).slice(0, 3)
                        .map(s => { const p = pages.find(x => x.key === s.target); return p ? p.name : '?'; });
                    document.getElementById('tt-sim').textContent = topSim.length ? topSim.join(', ') : 'none';

                    // Keywords chips
                    const chips = document.getElementById('tt-chips');
                    chips.innerHTML = '';
                    (d.keywords || []).slice(0, 8).forEach(k => {
                        const chip = document.createElement('span');
                        chip.className = 'tt-kw-chip'; chip.textContent = k.word;
                        chips.appendChild(chip);
                    });

                    ttEl.style.opacity = '1';

                    // Connected set (wiki + sim)
                    const conn = new Set([d.key]);
                    const allCurLinks = [...wikiLinks, ...getSimLinks(currentThreshold)];
                    allCurLinks.forEach(l => {
                        if (l.source.key === d.key) conn.add(l.target.key);
                        if (l.target.key === d.key) conn.add(l.source.key);
                    });

                    nEl.selectAll('.node-body')
                        .attr('fill-opacity', n => conn.has(n.key) ? 0.42 : 0.03)
                        .attr('stroke-opacity', n => conn.has(n.key) ? 1 : 0.06);
                    nEl.selectAll('.node-core')
                        .attr('fill-opacity', n => conn.has(n.key) ? 1 : 0.05);
                    nEl.selectAll('.node-label')
                        .style('fill', n => conn.has(n.key) ? '#dce4f0' : '#1e2228')
                        .style('font-size', n => n.key === d.key ? '13px' : '11px');

                    const isW = l => l.source.key === d.key || l.target.key === d.key;
                    wGlow.attr('stroke-opacity', l => isW(l) ? 0.75 : 0);
                    wBase.attr('stroke-opacity', l => isW(l) ? 0.95 : 0.04);
                    wFlow.attr('stroke-opacity', l => isW(l) ? 0.9 : 0);
                    if (sGlow) { sGlow.attr('stroke-opacity', l => isW(l) ? 0.75 : 0); }
                    if (sBase) { sBase.attr('stroke-opacity', l => isW(l) ? 0.85 : 0.03); }
                    if (sFlow) { sFlow.attr('stroke-opacity', l => isW(l) ? 0.8 : 0); }
                })
                .on('mousemove', e => {
                    const flip = e.clientX > innerWidth - 250;
                    ttEl.style.left = (flip ? e.clientX - 240 : e.clientX + 16) + 'px';
                    ttEl.style.top = (e.clientY - 80) + 'px';
                })
                .on('mouseleave', () => {
                    ttEl.style.opacity = '0';
                    nEl.selectAll('.node-body').attr('fill-opacity', 0.17).attr('stroke-opacity', 0.82);
                    nEl.selectAll('.node-core').attr('fill-opacity', 0.95);
                    nEl.selectAll('.node-label').style('fill', '#6b7585').style('font-size', '11px');
                    wGlow.attr('stroke-opacity', 0); wBase.attr('stroke-opacity', 0.30); wFlow.attr('stroke-opacity', 0.12);
                    if (sGlow) sGlow.attr('stroke-opacity', 0);
                    if (sBase) sBase.attr('stroke-opacity', 0.18);
                    if (sFlow) sFlow.attr('stroke-opacity', 0.08);
                })
                .on('click', (e, d) => { window.location.href = '/?openKey=' + encodeURIComponent(d.key); });

            /* ── CLUSTER FOCUS ─────────────────────────── */
            let aFocus = null;
            const fLbl = document.getElementById('focus-label');
            function focusFolder(f) {
                if (aFocus === f) { clearFocus(); return; }
                aFocus = f; fLbl.textContent = `Cluster: ${f} — click again to exit`; fLbl.style.opacity = '1';
                nEl.selectAll('.node-body')
                    .attr('fill-opacity', n => n.folder === f ? 0.38 : 0.02)
                    .attr('stroke-opacity', n => n.folder === f ? 0.95 : 0.05);
                nEl.selectAll('.node-core').attr('fill-opacity', n => n.folder === f ? 1 : 0.04);
                nEl.selectAll('.node-label').style('fill', n => n.folder === f ? '#dce4f0' : '#181c22');
                const inF = l => {
                    const sk = l.source.key || l.source, tk = l.target.key || l.target;
                    const sf = pages.find(p => p.key === sk)?.folder, tf = pages.find(p => p.key === tk)?.folder;
                    return sf === f || tf === f;
                };
                wBase.attr('stroke-opacity', l => inF(l) ? 0.55 : 0.03);
                wGlow.attr('stroke-opacity', l => {
                    const sk = l.source.key || l.source, tk = l.target.key || l.target;
                    const sf = pages.find(p => p.key === sk)?.folder, tf = pages.find(p => p.key === tk)?.folder;
                    return sf === f && tf === f ? 0.65 : 0;
                });
                if (sBase) sBase.attr('stroke-opacity', l => inF(l) ? 0.30 : 0.01);
                if (sGlow) sGlow.attr('stroke-opacity', 0);
            }
            function clearFocus() {
                aFocus = null; fLbl.style.opacity = '0';
                nEl.selectAll('.node-body').attr('fill-opacity', 0.17).attr('stroke-opacity', 0.82);
                nEl.selectAll('.node-core').attr('fill-opacity', 0.95);
                nEl.selectAll('.node-label').style('fill', '#6b7585');
                wBase.attr('stroke-opacity', 0.30); wGlow.attr('stroke-opacity', 0);
                if (sBase) sBase.attr('stroke-opacity', 0.18); if (sGlow) sGlow.attr('stroke-opacity', 0);
            }
            svg.on('click', e => { if (e.target.tagName === 'svg') clearFocus(); });

            /* ── TICK ──────────────────────────────────── */
            function updatePositions() {
                const x1 = d => d.source.x, y1 = d => d.source.y, x2 = d => d.target.x, y2 = d => d.target.y;
                wGlow.attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2);
                wBase.attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2);
                wFlow.attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2);
                if (sGlow) sGlow.attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2);
                if (sBase) sBase.attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2);
                if (sFlow) sFlow.attr('x1', x1).attr('y1', y1).attr('x2', x2).attr('y2', y2);
                nEl.attr('transform', d => `translate(${d.x},${d.y})`);
            }
            sim.on('tick', updatePositions);

            svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(0.82));
        }

        render().catch(err => {
            console.error(err);
            document.getElementById('loading-msg').textContent = 'Error: ' + err.message;
            document.getElementById('loading-fill').style.background = '#f87171';
        });
    </script>
</body>
